<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dustcanz — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=IBM+Plex+Mono:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --blue:  #0000ff;
      --f-display: 'Outfit', sans-serif;
      --f-mono:    'IBM Plex Mono', monospace;
      --f-body:    'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--f-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
    }
    .nav-tab {
      flex: 1;
      padding: 0.9rem;
      text-align: center;
      font-family: var(--f-mono);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      border-right: 1px solid var(--white);
      transition: background 0.15s, color 0.15s;
    }
    .nav-tab:last-child { border-right: none; }
    .nav-tab.active { background: var(--blue); color: var(--white); }
    .nav-tab:not(.active):hover { background: var(--white); color: var(--black); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 5rem;
      max-width: 540px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── PROFILE ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s forwards;
    }
    .avatar {
      width: 86px; height: 86px;
      border: 1px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      overflow: hidden; flex-shrink: 0;
      background: var(--black);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name {
      font-family: var(--f-display);
      font-size: 2.4rem;
      font-weight: 200;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
    }
    .profile-handle {
      font-family: var(--f-mono);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      background: var(--white);
      padding: 0.15rem 0.6rem;
      color: var(--black);
    }
    .profile-bio {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      line-height: 1.7;
      max-width: 28ch;
      font-weight: 300;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.2s forwards;
    }
    .divider-line { flex: 1; height: 1px; background: #333; }
    .divider-label {
      font-family: var(--f-mono);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #555;
    }

    /* ── LINK CARDS ── */
    .links {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .link-card {
      display: flex;
      align-items: center;
      width: 100%;
      border: 1px solid var(--white);
      border-top: none;
      text-decoration: none;
      color: var(--white);
      padding: 0.9rem 1.25rem;
      position: relative;
      overflow: hidden;
      transition: background 0.15s, color 0.15s;
      opacity: 0;
      animation: fadeUp 0.4s forwards;
      gap: 1rem;
    }
    .link-card:first-child { border-top: 1px solid var(--white); }

    .link-card::after {
      content: '→';
      position: absolute;
      right: 1.25rem;
      font-family: var(--f-mono);
      font-size: 0.85rem;
      transition: transform 0.2s;
    }

    /* no-link: non-clickable, no arrow */
    .link-card.no-link { cursor: default; }
    .link-card.no-link::after { display: none; }
    .link-card.no-link:hover { background: transparent; color: var(--white); }

    .link-card:not(.no-link):hover { background: var(--blue); color: var(--white); }
    .link-card:not(.no-link):hover::after { transform: translateX(4px); }
    .link-card:not(.no-link):hover .link-platform { color: rgba(255,255,255,0.5); }

    .link-icon {
      width: 1.8rem; height: 1.8rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 1rem; height: 1rem; }

    .link-text { flex: 1; }
    .link-platform {
      display: block;
      font-family: var(--f-mono);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.15rem;
      transition: color 0.15s;
    }
    .link-name {
      display: block;
      font-family: var(--f-display);
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1.1;
    }

    .link-card:nth-child(1) { animation-delay: 0.25s; }
    .link-card:nth-child(2) { animation-delay: 0.32s; }
    .link-card:nth-child(3) { animation-delay: 0.39s; }
    .link-card:nth-child(4) { animation-delay: 0.46s; }

    /* ── ACCORDION ── */
    .accordion-wrap {
      width: 100%;
      border: 1px solid var(--white);
      border-top: none;
      opacity: 0;
      animation: fadeUp 0.4s 0.46s forwards;
    }

    .accordion-trigger {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.9rem 1.25rem;
      gap: 1rem;
      background: transparent;
      border: none;
      color: var(--white);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      position: relative;
    }
    .accordion-trigger::after {
      content: '+';
      position: absolute;
      right: 1.25rem;
      font-family: var(--f-mono);
      font-size: 1rem;
      font-weight: 300;
      color: #555;
      transition: color 0.2s;
    }
    .accordion-trigger.open::after { content: '−'; color: var(--white); }
    .accordion-trigger:hover { background: #0d0d0d; }
    .accordion-trigger.open { background: #080808; }

    .accordion-body {
      display: none;
      flex-direction: column;
      border-top: 1px solid #222;
    }
    .accordion-body.open { display: flex; }

    .sub-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1.25rem 0.7rem 1.5rem;
      text-decoration: none;
      color: #bbb;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
      transition: background 0.15s, color 0.15s;
    }
    .sub-link:last-child { border-bottom: none; }
    .sub-link::after {
      content: '→';
      position: absolute;
      right: 1.25rem;
      font-family: var(--f-mono);
      font-size: 0.75rem;
      color: #333;
      transition: transform 0.2s, color 0.2s;
    }
    .sub-link:hover { background: var(--blue); color: var(--white); }
    .sub-link:hover::after { transform: translateX(4px); color: var(--white); }
    .sub-link:hover .sub-link-instance { color: rgba(255,255,255,0.45); }

    .sub-link-icon {
      width: 1.4rem; height: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: 0.4;
    }
    .sub-link-icon svg { width: 0.85rem; height: 0.85rem; }

    .sub-link-instance {
      display: block;
      font-family: var(--f-mono);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #444;
      margin-bottom: 0.1rem;
      transition: color 0.15s;
    }
    .sub-link-name {
      display: block;
      font-family: var(--f-display);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid #1a1a1a;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p {
      font-family: var(--f-mono);
      font-size: 0.6rem;
      font-weight: 300;
      color: #333;
      letter-spacing: 0.12em;
    }
    .footer-sq { width: 6px; height: 6px; background: var(--blue); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .profile-name { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav>

  <script>
    function toggleAccordion(btn) {
      const body = btn.nextElementSibling;
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
      btn.setAttribute('aria-expanded', String(!isOpen));
    }
  </script>
