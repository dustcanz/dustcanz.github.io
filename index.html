<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --blue:  #0000ff;
      --f-display: 'Barlow Condensed', sans-serif;
      --f-mono:    'IBM Plex Mono', monospace;
      --f-body:    'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--f-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      border-bottom: 2px solid var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
    }
    .nav-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      font-family: var(--f-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      border-right: 2px solid var(--white);
      transition: background 0.15s, color 0.15s;
    }
    .nav-tab:last-child { border-right: none; }
    .nav-tab.active {
      background: var(--blue);
      color: var(--white);
    }
    .nav-tab:not(.active):hover {
      background: var(--white);
      color: var(--black);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 5rem;
      max-width: 540px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── PROFILE ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 3rem;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s forwards;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border: 3px solid var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--black);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: var(--f-display);
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
    }

    .profile-handle {
      font-family: var(--f-mono);
      font-size: 0.75rem;
      color: var(--blue);
      letter-spacing: 0.15em;
      background: var(--white);
      padding: 0.2rem 0.6rem;
      color: var(--black);
    }

    .profile-bio {
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
      line-height: 1.7;
      max-width: 30ch;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.2s forwards;
    }
    .divider-line { flex: 1; height: 2px; background: var(--white); }
    .divider-label {
      font-family: var(--f-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #888;
    }

    /* ── LINK CARDS ── */
    .links {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 0;
    }

    .link-card {
      display: flex;
      align-items: center;
      width: 100%;
      border: 2px solid var(--white);
      border-top: none;
      text-decoration: none;
      color: var(--white);
      padding: 1rem 1.25rem;
      position: relative;
      overflow: hidden;
      transition: background 0.15s, color 0.15s;
      opacity: 0;
      animation: fadeUp 0.4s forwards;
      gap: 1rem;
    }
    .link-card:first-child { border-top: 2px solid var(--white); }

    .link-card::after {
      content: '→';
      position: absolute;
      right: 1.25rem;
      font-family: var(--f-mono);
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .link-card:hover {
      background: var(--blue);
      color: var(--white);
    }
    .link-card:hover::after { transform: translateX(4px); }
    .link-card:hover .link-platform { color: rgba(255,255,255,0.6); }

    .link-icon {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 1.1rem; height: 1.1rem; }

    .link-text { flex: 1; }
    .link-platform {
      display: block;
      font-family: var(--f-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.1rem;
      transition: color 0.15s;
    }
    .link-name {
      display: block;
      font-family: var(--f-display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    /* stagger */
    .link-card:nth-child(1) { animation-delay: 0.25s; }
    .link-card:nth-child(2) { animation-delay: 0.32s; }
    .link-card:nth-child(3) { animation-delay: 0.39s; }
    .link-card:nth-child(4) { animation-delay: 0.46s; }
    .link-card:nth-child(5) { animation-delay: 0.53s; }
    .link-card:nth-child(6) { animation-delay: 0.60s; }

    /* ── FOOTER ── */
    footer {
      border-top: 2px solid var(--white);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p {
      font-family: var(--f-mono);
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.1em;
    }
    .footer-sq {
      width: 8px; height: 8px;
      background: var(--blue);
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .profile-name { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-tab active">Links</a>
    <a href="about.html" class="nav-tab">About</a>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="profile">
      <div class="avatar">
        <!-- アバター画像: <img src="img/avatar.jpg" alt="avatar"> -->
        🎮
      </div>
      <h1 class="profile-name">Your Name</h1>
      <span class="profile-handle">@yourhandle</span>
      <p class="profile-bio">ここにひとこと自己紹介を書く</p>
    </div>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-label">SNS &amp; Links</span>
      <span class="divider-line"></span>
    </div>

    <div class="links">

      <!-- Twitter / X -->

        </div>

          <span class="link-platform">GitHub</span>

          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        </div>
        <div class="link-text">
          <span class="link-platform">Discord</span>
          <span class="link-name">yourname</span>
        </div>
      </a>

      <!-- Email -->
      <a href="mailto:your@email.com" class="link-card">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        </div>
        <div class="link-text">
          <span class="link-platform">Email</span>
          <span class="link-name">your@email.com</span>
        </div>
      </a>

    </div>
  </main>

  <footer>
    <p>© 2025 Your Name</p>
    <div class="footer-sq"></div>
    <p>GitHub Pages</p>
  </footer>

</body>
</html>
